openapi: 3.0.0
info:
  description: This API is used with the Alpha Tracker asbestos management software. To request your Client ID and API Key please contact support@start-software.com.
  version: 1.0.0
  title: Alpha Tracker API
  contact:
    name: Alpha Tracker
    url: https://alpha-tracker.co.uk
    email: support@start-software.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
security:
  - Alpha_Tracker_API_Key: []
    Client_ID: []
tags:
  - name: Appointments
  - name: Buildings
  - name: Files
  - name: Milestones
  - name: Projects
  - name: Project Types
  - name: Quotations
  - name: Reinspection
  - name: Repair Instructions
  - name: Reports
  - name: Samples
  - name: Sites
  - name: Site Buildings
  - name: Staff
  - name: Survey Items
paths:
  /quotations/{quoteReference}:
    get:
      tags:
        - Quotations
      summary: Gets a quotation
      description: Returns information about a specific quotation
      parameters:
        - in: path
          name: quoteReference
          description: The Quote Reference to retrieve
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quotation found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Quotation not found
  /quotations/search:
    get:
      tags:
        - Quotations
      summary: Returns a list of quotations based on search criteria
      description: Returns a list of quotations using search filters
      parameters:
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/paginate"
        - $ref: "#/components/parameters/pageNumber"
      responses:
        "200":
          description: Quotations found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/QuotationsPaginated"
                  - $ref: "#/components/schemas/Quotations"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /repairinstructions/search:
    get:
      tags:
        - Repair Instructions
      summary: Returns a list of repair instructions based on search criteria
      description: Returns a list of repair instructions using search filters
      parameters:
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/paginate"
        - $ref: "#/components/parameters/pageNumber"
      responses:
        "200":
          description: Repair instructions found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RepairInstructionsPaginated"
                  - $ref: "#/components/schemas/RepairInstructions"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /repairinstructions/repairinstruction/{repairInstructionId}:
    get:
      tags:
        - Repair Instructions
      summary: Gets a repair instruction
      description: Returns information about a specific repair instruction
      parameters:
        - in: path
          name: repairInstructionId
          description: The repair instruction ID to retrieve
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repair instruction found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairInstruction"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Repair instruction not found
  /samples/{projectNumber}:
    get:
      tags:
        - Samples
      summary: Gets a list of samples from a project
      description: Returns a list of samples associated with a project
      parameters:
        - in: path
          name: projectNumber
          description: The project number you want to retrieve samples from
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Samples found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Samples"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: No samples found
    post:
      tags:
        - Samples
      summary: Create samples for a project
      description: Adds one or more samples to the specified project.
      parameters:
        - in: path
          name: projectNumber
          description: The project number to add samples to
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - sampleId
                  - material
                properties:
                  sampleId:
                    type: string
                    description: Unique identifier for the sample
                  locationDescription:
                    type: string
                    description: Description of the sample location
                  item:
                    type: string
                    description: The item description
                  material:
                    type: string
                    description: The material description
      responses:
        "201":
          description: Samples created successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /sites:
    post:
      tags:
        - Sites
      summary: Creates a site
      description: Creates a site with the information provided
      requestBody:
        content:
          application/json:
            schema:
              properties:
                clientId:
                  type: string
                  description: The Client ID to create the site with
                  maxLength: 255
                siteName:
                  type: string
                  description: The name of the site to create
                  maxLength: 255
                siteAddress:
                  type: string
                  description: The address of the site to create
                sitePostcode:
                  type: string
                  description: The postcode of the site to create
                  maxLength: 50
                siteReference:
                  type: string
                  description: The reference/UPRN of the site to create
                  maxLength: 50
                siteContactName:
                  type: string
                  description: The name of the main contact for the site
                  maxLength: 50
                siteContactTelephone:
                  type: string
                  description: The telephone of the main contact for the site
                  maxLength: 50
                siteContactEmail:
                  type: string
                  description: The email of the main contact for the site
                  maxLength: 150
                  format: email
                landlord:
                  type: string
                  description: The landlord for the site
                  maxLength: 250
        required: true
      responses:
        "201":
          description: Site created
          content:
            application/json:
              schema:
                type: object
                properties:
                  siteId:
                    type: integer
                    description: The Site ID created
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /sites/{siteId}:
    get:
      tags:
        - Sites
      summary: Gets a site
      description: |
        Returns information about a specific site
      parameters:
        - in: path
          name: siteId
          description: The Site ID you want to retrieve
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Site found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
    patch:
      tags:
        - Sites
      summary: Updates a site
      description: Updates a site with the information provided
      parameters:
        - in: path
          name: siteId
          description: The Site ID you want to update
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                siteName:
                  type: string
                  description: The new site name
                siteAddress:
                  type: string
                  description: The new site address
                sitePostcode:
                  type: string
                  description: The new site postcode
                siteReference:
                  type: string
                  description: The new site reference
                siteContactName:
                  type: string
                  description: The new name of thesite contact
                siteContactTelephone:
                  type: string
                  description: The new telephone number of the site contact
                siteContactEmail:
                  type: string
                  description: The new email address of the site contact
                  format: email
                landlord:
                  type: string
                  description: The new landlord of the site
        required: true
      responses:
        "200":
          description: Site updated
        "400":
          description: Bad request
        "401":
          description: Unauthorized
    delete:
      tags:
        - Sites
      summary: Deletes a site
      description: Deletes the specified site
      parameters:
        - in: path
          name: siteId
          description: The Site ID you want to delete
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Site deleted
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Site not found
  /sites/search:
    get:
      tags:
        - Sites
      summary: Returns a list of sites based on search criteria
      description: Returns a list of sites based on specified search criteria
      parameters:
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/paginate"
        - $ref: "#/components/parameters/pageNumber"
      responses:
        "200":
          description: Sites found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SitesPaginated"
                  - $ref: "#/components/schemas/Sites"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /projects:
    post:
      tags:
        - Projects
      summary: Creates a project
      description: Creates a project with the data provided
      requestBody:
        content:
          application/json:
            schema:
              required:
                - projectLetter
                - clientId
              properties:
                projectLetter:
                  type: string
                  description: The project letter to create the project with
                  maxLength: 1
                clientId:
                  type: string
                  description: The Client ID associated with the project
                  maxLength: 255
                clientOrderNumber:
                  type: string
                  description: The Client Order Number
                  maxLength: 50
                clientProjectRef:
                  type: string
                  description: The Client Project Ref
                  maxLength: 50
                siteId:
                  type: integer
                  description: The Site ID associated with the project
                reportRecipientName1:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress1:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                reportRecipientName2:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress2:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                reportRecipientName3:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress3:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                reportRecipientName4:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress4:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                reportRecipientName5:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress5:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                invoiceRecipientName:
                  type: string
                  description: The invoice recipient's name
                  maxLength: 255
                projectManagerId:
                  type: integer
                  description: The Staff ID of the project manager
                projectTypeId:
                  type: integer
                  description: The Project Type ID
                estimatedTotalProjectValue:
                  type: integer
                  description: The estimated total project value
                status:
                  type: string
                  description: The status of the project
                statusNotes:
                  type: string
                  description: The status notes of the project
                allocationStatus:
                  type: string
                  description: The allocation status of the project
                projectOpened:
                  type: string
                  format: date
                  description: Project opened date
                quoteProduced:
                  type: string
                  format: date
                  description: Quote produced date
                orderReceived:
                  type: string
                  format: date
                  description: Order received date
                reportProduced:
                  type: string
                  format: date
                  description: Report produced date
                projectInvoiced:
                  type: string
                  format: date
                  description: Project invoiced date
                projectClosed:
                  type: string
                  format: date
                  description: Project closed date
                projectNotes:
                  type: string
                  description: The project notes
                showOnWeb:
                  type: boolean
                  description: If the project is shown on the client portal
        required: true
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectNumber:
                    type: string
                    description: The project number created
                    maxLength: 50
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /projects/{projectNumber}:
    get:
      tags:
        - Projects
      summary: Gets a project
      description: Returns information about the specified project
      parameters:
        - in: path
          name: projectNumber
          description: The project number you want to retrieve
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Project not found
    patch:
      tags:
        - Projects
      summary: Updates a project
      description: Updates a project with the data provided
      parameters:
        - in: path
          name: projectNumber
          description: The project number you want to update
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                clientId:
                  type: string
                  description: The Client ID associated with the project
                  maxLength: 255
                clientOrderNumber:
                  type: string
                  description: The Client Order Number
                  maxLength: 50
                clientProjectRef:
                  type: string
                  description: The Client Project Ref
                  maxLength: 50
                siteId:
                  type: integer
                  description: The Site ID associated with the project
                reportRecipientName1:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress1:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                reportRecipientName2:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress2:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                reportRecipientName3:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress3:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                reportRecipientName4:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress4:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                reportRecipientName5:
                  type: string
                  description: The report recipient's name
                  maxLength: 255
                reportRecipientEmailAddress5:
                  type: string
                  description: The report recipient's email address
                  maxLength: 255
                invoiceRecipientName:
                  type: string
                  description: The invoice recipient's name
                  maxLength: 255
                projectManagerId:
                  type: integer
                  description: The Staff ID of the project manager
                projectTypeId:
                  type: integer
                  description: The Project Type ID
                estimatedTotalProjectValue:
                  type: integer
                  description: The estimated total project value
                status:
                  type: string
                  description: The status of the project
                statusNotes:
                  type: string
                  description: The status notes of the project
                allocationStatus:
                  type: string
                  description: The allocation status of the project
                quoteProduced:
                  type: string
                  format: date
                  description: Quote produced date
                orderReceived:
                  type: string
                  format: date
                  description: Order received date
                reportProduced:
                  type: string
                  format: date
                  description: Report produced date
                projectInvoiced:
                  type: string
                  format: date
                  description: Project invoiced date
                projectClosed:
                  type: string
                  format: date
                  description: Project closed date
                projectNotes:
                  type: string
                  description: The project notes
                showOnWeb:
                  type: boolean
                  description: If the project is shown on the client portal
        required: true
      responses:
        "200":
          description: Project updated
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Project not found
    delete:
      tags:
        - Projects
      summary: Deletes a project
      description: Deletes the specified project number
      parameters:
        - in: path
          name: projectNumber
          description: The project number you want to delete
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project deleted
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Project not found
  /projects/search:
    get:
      tags:
        - Projects
      summary: Returns a list of projects based on search criteria
      description: Returns a list of projects based on specified search criteria
      parameters:
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/paginate"
        - $ref: "#/components/parameters/pageNumber"
      responses:
        "200":
          description: Projects found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProjectsPaginated"
                  - $ref: "#/components/schemas/Projects"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /milestones/{projectNumber}:
    get:
      tags:
        - Milestones
      summary: Gets a list of milestones for a project
      description: |
        Returns a list of milestones for a specific project
      parameters:
        - in: path
          name: projectNumber
          description: The project number you want to retrieve the milestones from
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Milestones found
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    milestone:
                      type: string
                      description: The name of the milestone
                    position:
                      type: integer
                      description: The position number of the milestone
                    targetDate:
                      type: string
                      format: date
                      description: The target date of completion
                    assignedToId:
                      type: integer
                      description: The Staff ID the milestone is assigned to
                    completionDate:
                      type: string
                      format: date
                      description: Thedate of completion
                    completedById:
                      type: integer
                      description: The Staff ID the milestone was completed by
                    notes:
                      type: string
                      description: The notes recorded against the milestone
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Project not found
  /buildings/{projectNumber}:
    post:
      tags:
        - Buildings
      summary: Creates a building
      description: Creates a building under the project specified
      parameters:
        - in: path
          name: projectNumber
          description: The project number you want to host the buildings under
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                buildingRef:
                  type: string
                  description: The Building Ref/UPRN to create the building with
                  maxLength: 50
                buildingName:
                  type: string
                  description: The Building Name to create the building with
                  maxLength: 255
        required: true
      responses:
        "200":
          description: Building created
        "400":
          description: Bad request
        "401":
          description: Unauthorized
    get:
      tags:
        - Buildings
      summary: Gets a list of buildings for a project
      description: Returns a list of buildings for a specific project
      parameters:
        - in: path
          name: projectNumber
          description: The project number that hosts the buildings
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Buildings found
          content:
            application/json:
              schema:
                type: object
                properties:
                  buildingId:
                    type: integer
                    description: The ID of the building
                  buildingRef:
                    type: string
                    description: The Building Ref/UPRN of the building
                    maxLength: 50
                  buildingName:
                    type: string
                    description: The name of the building
                    maxLength: 255
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /sitebuildings/{siteId}:
    post:
      tags:
        - Site Buildings
      summary: Creates a site building
      description: Creates a site building under the site specified
      parameters:
        - in: path
          name: siteId
          description: The site id you want to host the buildings under
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                buildingRef:
                  type: string
                  description: The Building Ref/UPRN to create the site building with
                  maxLength: 50
                buildingName:
                  type: string
                  description: The Building Name to create the site building with
                  maxLength: 255
                buildingAddress:
                  type: string
                  description: The Building Address to create the site building with
                  maxLength: 250
                buildingPostcode:
                  type: string
                  description: The Building Postcode to create the site building with
                  maxLength: 10
        required: true
      responses:
        "200":
          description: Site Building created
        "400":
          description: Bad request
        "401":
          description: Unauthorized
    get:
      tags:
        - Site Buildings
      summary: Gets a list of buildings for a site
      description: Returns a list of buildings for a specific site
      parameters:
        - in: path
          name: siteId
          description: The site id that hosts the buildings
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Site Buildings found
          content:
            application/json:
              schema:
                type: object
                properties:
                  siteBuildingId:
                    type: integer
                    description: The ID of the building
                  buildingRef:
                    type: string
                    description: The Building Ref/UPRN of the building
                    maxLength: 50
                  buildingName:
                    type: string
                    description: The name of the building
                    maxLength: 255
                  buildingAddress:
                    type: string
                    description: The address of the building
                    maxLength: 250
                  buildingPostcode:
                    type: string
                    description: The postcode of the building
                    maxLength: 10
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /surveyitems/item/{surveyItemId}:
    get:
      tags:
        - Survey Items
      summary: Gets a survey item
      description: |
        Returns data about a specific survey item
      parameters:
        - in: path
          name: surveyItemId
          description: The survey item ID you want to retrieve
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survey item found
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    description: The date of the item
                  floor:
                    type: string
                    maxLength: 5
                    description: The floor the item is located
                  location:
                    type: string
                    maxLength: 100
                    description: The location number/reference the item is located
                  locationDescription:
                    type: string
                    maxLength: 255
                    description: The description of where the item is located
                  item:
                    type: string
                    maxLength: 150
                    description: The item description
                  materialCode:
                    type: string
                    maxLength: 3
                    description: The material code of the item
                  materialDescription:
                    type: string
                    maxLength: 100
                    description: The material description
                  noAccess:
                    type: boolean
                    description: >-
                      Whether or not the item was accessible. True if no access
                      is gained
                  approach:
                    type: string
                    maxLength: 50
                    description: >-
                      The approach of the item, e.g. S for Sampled, P for
                      Presumed etc.
                  sampleNumber:
                    type: string
                    maxLength: 255
                    description: The sample number if applicable
                  sampleNotes:
                    type: string
                    description: The notes about the sample if applicable
                  extent:
                    type: string
                    maxLength: 50
                    description: The measurement of the item
                  UoM:
                    type: string
                    maxLength: 50
                    description: The unit of measure
                  productTypeScore:
                    type: integer
                    minimum: 0
                    maximum: 3
                    description: The score of the product type
                  productTypeDescription:
                    type: string
                    maxLength: 250
                    description: The description of the product type
                  conditionScore:
                    type: integer
                    minimum: 0
                    maximum: 3
                    description: The score of the condition
                  conditionDescription:
                    type: string
                    maxLength: 250
                    description: The description of the condition of the item
                  surfaceTreatmentScore:
                    type: integer
                    minimum: 0
                    maximum: 3
                    description: The score of the surface treatment
                  surfaceTreatmentDescription:
                    type: string
                    maxLength: 250
                    description: The description of the surface treatment
                  asbestosTypeScore:
                    type: integer
                    minimum: 0
                    maximum: 3
                    description: The score of the asbestos type.
                  identification:
                    type: string
                    maxLength: 250
                    description: The identification / asbestos type description
                  materialScore:
                    minimum: 0
                    maximum: 12
                    type: integer
                    description: The overall material score
                  priorityScore:
                    type: integer
                    minimum: 0
                    maximum: 12
                    description: The overall priority score
                  totalScore:
                    type: integer
                    minimum: 0
                    maximum: 24
                    description: The overall total score
                  recommendedAction:
                    type: string
                    maxLength: 255
                    description: The recommended action for the item
                  recommendationComments:
                    type: string
                    description: The recommendation comments
                  photoFilename:
                    type: string
                    maxLength: 250
                    description: The filename of the photo
                  closeUpPhotoFilename:
                    type: string
                    maxLength: 250
                    description: The filename of the close-up photo
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Survey item not found
  /surveyitems/{projectNumber}:
    get:
      tags:
        - Survey Items
      summary: Gets a list of survey items for a project
