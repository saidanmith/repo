servers:
  - url: https://manager.alphatracker.co.uk/api
    description: Production server
components:
  parameters:
    filter:
      in: query
      name: filter
      description: |
        A filter used to search for records

        The following operators can be used

        | Operator | Description |
        | ------- | --------|
        | =   | Equal   |
        | >   | Greater than   |
        | <   | Less than   |
        | >=   | Greater than or equal   |
        | <=   |   Less than or equal   |
        | BETWEEN   |   Between a certain range   |
        | LIKE   |   Search for a pattern   |
        | IN   |     To specify multiple possible values for a column   |

        They can be combined with AND, OR, and NOT operators
      required: true
      schema:
        type: string
    limit:
      in: query
      name: limit
      description: Limits the amount of records that are returned, can be used with or without the paginate parameter
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 1000
    paginate:
      in: query
      name: paginate
      description: Enables / disables the results being paginated
      required: false
      schema:
        type: boolean
        default: true
    pageNumber:
      in: query
      name: pageNumber
      description: The page number to load if pagination is enabled
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
  schemas:
    Pagination:
      type: object
      properties:
        totalRecords:
          type: integer
        totalPages:
          type: integer
          minimum: 1
        currentPage:
          type: integer
        nextPage:
          type: integer
        nextPageUrl:
          type: string
          format: uri
        previousPage:
          type: integer
        previousPageUrl:
          type: string
